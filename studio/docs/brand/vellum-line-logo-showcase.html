<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vellum &amp; Line - Final Monogram Assets</title>
    <style>
      :root {
        --bg: #070d14;
        --panel: #0d1a27;
        --stage: #08131d;
        --ink: #edf3f4;
        --paper: #f2eadb;
        --muted: #9db7c8;
        --route: #ff8259;
        --line: rgba(157, 183, 200, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 12%, rgba(255, 130, 89, 0.13), transparent 30%),
          repeating-linear-gradient(90deg, rgba(157, 183, 200, 0.04) 0 1px, transparent 1px 30px),
          linear-gradient(160deg, #070d14 0%, #0d1a27 54%, #08121c 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding: 38px 0 64px;
      }

      .hero,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(13, 26, 39, 0.84);
      }

      .hero {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 34px;
        align-items: center;
        padding: 30px;
      }

      .mark-stage {
        display: grid;
        place-items: center;
        min-height: 230px;
        border-radius: 8px;
        background: var(--stage);
      }

      .mark-stage img {
        width: 168px;
        height: 168px;
      }

      .eyebrow,
      .label {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-transform: uppercase;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--route);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
      }

      h1 {
        margin: 0;
        color: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(46px, 7vw, 84px);
        font-weight: 500;
        line-height: 0.95;
      }

      .summary {
        max-width: 680px;
        margin: 18px 0 0;
        color: rgba(237, 243, 244, 0.72);
        font-size: 16px;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .card {
        padding: 20px;
      }

      .preview {
        display: grid;
        place-items: center;
        height: 180px;
        margin-bottom: 16px;
        border: 1px solid rgba(157, 183, 200, 0.16);
        border-radius: 8px;
        background: var(--stage);
      }

      .preview img {
        max-width: 80%;
        max-height: 130px;
      }

      .preview.banner img {
        max-width: 100%;
        max-height: 160px;
      }

      h2 {
        margin: 0 0 8px;
        color: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 23px;
        font-weight: 500;
      }

      .label {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
      }

      @media (max-width: 860px) {
        .hero,
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="mark-stage">
          <img src="./svg/vellum-line-monogram.svg" alt="Vellum & Line monogram">
        </div>
        <div>
          <p class="eyebrow">Final selected logo</p>
          <h1>Vellum &amp; Line</h1>
          <p class="summary">
            Final direction: Vellum Monogram. The V shape carries the brand shorthand, and the warm route line keeps the map-memory idea visible in the dark product UI.
          </p>
        </div>
      </section>

      <section class="grid" aria-label="Final logo asset previews">
        <article class="card">
          <div class="preview"><img src="./svg/vellum-line-monogram.svg" alt=""></div>
          <h2>Symbol</h2>
          <p class="label">SVG + PNG</p>
        </article>
        <article class="card">
          <div class="preview"><img src="./svg/vellum-line-monogram-app-icon.svg" alt=""></div>
          <h2>App Icon</h2>
          <p class="label">PWA / Apple Touch</p>
        </article>
        <article class="card">
          <div class="preview"><img src="./svg/vellum-line-monogram-lockup.svg" alt=""></div>
          <h2>Lockup</h2>
          <p class="label">Header / Brand</p>
        </article>
        <article class="card">
          <div class="preview banner"><img src="./png/vellum-line-og-banner-1200x630.png" alt=""></div>
          <h2>OG Banner</h2>
          <p class="label">1200 x 630</p>
        </article>
      </section>
    </main>
  </body>
</html>
